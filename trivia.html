<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jugar Trivia | IntelliQuiz</title>
    <meta name="description" content="Responde preguntas de trivia y gana puntos en IntelliQuiz.">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="64x32" href="image/logo.png">
</head>
<body>

    <audio id="bgMusic" loop>
    <source src="musica/Modern Attempt.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- Header -->
    <div class="header">
        <span class="categoria" id="categoria"></span>
        <span class="temporizador" id="temporizador"></span>
        <button class="btn btn-salir" onclick="salirTrivia()">Salir</button>
    </div>

    <!-- Pregunta -->
    <div class="pregunta" id="pregunta"></div>

    <!-- Respuestas -->
    <div class="respuestas">
        <button class="btn" id="btn1" onclick="oprimir_btn(this)">opcion1</button>
        <button class="btn" id="btn2" onclick="oprimir_btn(this)">opcion2</button>
        <button class="btn" id="btn3" onclick="oprimir_btn(this)">opcion3</button>
        <button class="btn" id="btn4" onclick="oprimir_btn(this)">opcion4</button>
    </div>

</div>

<!-- Modal pregunta -->
<div id="modal" class="modal oculto">
    <div class="modal-contenido">
        <h2 id="modal-texto">Ganaste 🎉</h2>
        <p id="modal-mensaje"></p><br>
        <button id="btn-continuar">Continuar</button>
    </div>
</div>

<!-- Modal final -->
<div id="modal-final" class="modal oculto">
    <div class="modal-contenido">
        <h2>¡Terminaste la trivia! 🎉</h2>
        <p id="texto-puntaje">Tu puntaje: 0/100</p><br>
        <button id="btn-finalizar" onclick="location.href='index.html'">Jugar de nuevo</button>
    </div>
</div>

<script>
    // =====================
    // Variables globales
    // =====================
    const modal = document.getElementById("modal");
    const btnContinuar = document.getElementById("btn-continuar");

    let categoria = localStorage.getItem("categoria");
    let intervalo;          // temporizador
    let numeroPreguntas = 0; // cuántas preguntas han pasado
    let puntuacion = 0;  // puntaje acumulado
    let intentos = 0;  // intentos por pregunta
    let pregunta = null;
    let tiempoRestante = 20;

    // =====================
    // Cargar preguntas
    // =====================
    let base = readText("base_preguntas.json");
    let todasLasPreguntas = JSON.parse(base);
    let preguntasFiltradas = todasLasPreguntas.filter(p => p.categoria === categoria);

    console.log("Categoria seleccionada:", categoria);

    // =====================
    // Inicio
    // =====================
    function getStorageKey() {
        return categoria ? `triviaProgress_${categoria}` : null;
    }

    function saveProgress() {
        const key = getStorageKey();
        if (!key || !pregunta) return;

        const progreso = {
            categoria,
            numeroPreguntas,
            puntuacion,
            intentos,
            tiempoRestante,
            preguntasFiltradas,
            preguntaActual: pregunta
        };

        localStorage.setItem(key, JSON.stringify(progreso));
    }

    function loadProgress() {
        const key = getStorageKey();
        if (!key) return null;

        const saved = localStorage.getItem(key);
        if (!saved) return null;

        try {
            return JSON.parse(saved);
        } catch (error) {
            return null;
        }
    }

    function resetProgress() {
        const key = getStorageKey();
        if (!key) return;
        localStorage.removeItem(key);
    }

    function renderPregunta() {
        if (!pregunta) return;

        select_id("categoria").innerHTML  = pregunta.categoria;
        select_id("pregunta").innerHTML   = pregunta.pregunta;
        select_id("btn1").innerHTML       = pregunta.opciones[0];
        select_id("btn2").innerHTML       = pregunta.opciones[1];
        select_id("btn3").innerHTML       = pregunta.opciones[2];
        select_id("btn4").innerHTML       = pregunta.opciones[3];
    }

    function iniciarJuegoGuardado() {
        if (!categoria) {
            location.href = 'index.html';
            return;
        }

        const progresoGuardado = loadProgress();

        if (progresoGuardado && progresoGuardado.categoria === categoria && progresoGuardado.preguntaActual) {
            preguntasFiltradas = progresoGuardado.preguntasFiltradas || preguntasFiltradas;
            pregunta = progresoGuardado.preguntaActual;
            numeroPreguntas = progresoGuardado.numeroPreguntas || 0;
            puntuacion = progresoGuardado.puntuacion || 0;
            intentos = progresoGuardado.intentos || 0;
            tiempoRestante = typeof progresoGuardado.tiempoRestante === 'number' ? progresoGuardado.tiempoRestante : 20;

            document.querySelectorAll(".btn").forEach(btn => {
                btn.classList.remove("correcto", "incorrecto");
                btn.disabled = false;
            });

            renderPregunta();
        } else {
            resetProgress();
            randomQuestion();
        }

        temporizador();
    }

    // =====================
    // Funciones utilitarias
    // =====================
    function select_id(id) {
        return document.getElementById(id);
    }

    function readText(ruta_local) {
        var texto = null;
        var xmlhttp = new XMLHttpRequest();
        xmlhttp.open("GET", ruta_local, false);
        xmlhttp.send();
        if (xmlhttp.status === 200) {
            texto = xmlhttp.responseText;
        }
        return texto;
    }

    // =====================
    // Lógica de preguntas
    // =====================
    function randomQuestion() {
        if (preguntasFiltradas.length === 0) {
            mostrarModalFinal();
            return;
        }

        let aleatorio = Math.floor(Math.random() * preguntasFiltradas.length);
        pregunta = preguntasFiltradas[aleatorio];
        preguntasFiltradas.splice(aleatorio, 1);
        tiempoRestante = 20;
        renderPregunta();
        saveProgress();
    }

    // =====================
    // Responder
    // =====================
    function oprimir_btn(botonSeleccionado) {
        let texto = botonSeleccionado.innerText;

        if (texto == pregunta.respuesta_correcta) {
            botonSeleccionado.classList.add("correcto");
            select_id("modal-texto").innerHTML = "¡Correcto! 🎉";
            select_id("modal-mensaje").innerHTML = `Dato interesante: ${pregunta.dato_interesante}`;
            clearInterval(intervalo);

            if (intentos == 0) puntuacion += 10;
            else if (intentos == 1) puntuacion += 5;

            intentos = 0; // reinicia intentos para la siguiente pregunta
            console.log("Puntaje actual:", puntuacion);
            saveProgress();
            mostrarModal();

        } else {
            intentos++;
            botonSeleccionado.classList.add("incorrecto");
            botonSeleccionado.disabled = true;
            saveProgress();

            if (intentos >= 2) {
                intentos = 0; // reinicia intentos para la siguiente pregunta
                clearInterval(intervalo);
                select_id("modal-texto").innerHTML = "¡Respuesta incorrecta! 😢";
                select_id("modal-mensaje").innerHTML = `Pista: ${pregunta.pista_estudio}`;
                saveProgress();
                mostrarModal();
            }
        }
    }

    // =====================
    // Temporizador
    // =====================
    function temporizador() {
        clearInterval(intervalo);

        intervalo = setInterval(() => {
            select_id("temporizador").innerHTML = `⏱ ${tiempoRestante}s`;

            if (tiempoRestante <= 0) {
                clearInterval(intervalo);
                select_id("modal-texto").innerHTML = "¡Se acabó el tiempo! 😢";
                select_id("modal-mensaje").innerHTML = `Pista: ${pregunta.pista_estudio}`;
                document.querySelectorAll(".btn").forEach(btn => btn.disabled = true);
                saveProgress();
                mostrarModal();
                return;
            }

            tiempoRestante--;
            saveProgress();
        }, 1000);
    }

    // =====================
    // Modales
    // =====================
    function mostrarModal() {
        select_id("modal").classList.remove("oculto");

        btnContinuar.onclick = () => {
            numeroPreguntas++;

            const todosLosBotones = document.querySelectorAll(".btn");
            todosLosBotones.forEach(btn => {
                btn.classList.remove("correcto", "incorrecto");
                btn.disabled = false;
            });

            select_id("modal").classList.add("oculto");

            if (numeroPreguntas >= 10) {
                mostrarModalFinal();
                return;
            }

            randomQuestion();
            temporizador();
        };
    }

    function mostrarModalFinal() {
        clearInterval(intervalo);
        resetProgress();
        select_id("modal").classList.add("oculto");
        select_id("modal-final").classList.remove("oculto");
        select_id("texto-puntaje").innerHTML = `Tu puntaje: ${puntuacion}/100`;
    }

    function salirTrivia() {
        clearInterval(intervalo);
        resetProgress();
        location.href = 'index.html';
    }

    // =====================
    // Música de fondo
    // =====================
    const musica = document.getElementById("bgMusic");

    window.addEventListener("load", () => {
        iniciarJuegoGuardado();

        const activa = localStorage.getItem("musicaActiva") === "true";

        if (activa) {
            musica.volume = 0.3;

            const tiempo = localStorage.getItem("tiempoMusica");
            if (tiempo) {
                musica.currentTime = tiempo;
            }

            musica.play().catch(() => {
                console.log("Esperando interacción...");
            });
        }
    });

    // Guardar tiempo de la musica
    setInterval(() => {
        if (!musica.paused) {
            localStorage.setItem("tiempoMusica", musica.currentTime);
        }
    }, 1000);
</script>

</body>
</html>
